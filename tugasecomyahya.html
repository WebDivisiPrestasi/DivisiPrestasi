<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yahya Store - AI Ecommerce</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f7fa;
}

/* NAVBAR */
nav{
background:#111;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h2{
color:#00f2ff;
}

nav input{
padding:8px;
border-radius:6px;
border:none;
width:250px;
}

/* HERO */
.hero{
height:40vh;
background:linear-gradient(135deg,#00f2ff,#0072ff);
display:flex;
justify-content:center;
align-items:center;
color:white;
flex-direction:column;
text-align:center;
}

/* PRODUCT GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
}

.card h3{
margin:10px 0;
}

.price{
color:#0072ff;
font-weight:bold;
}

/* 3D PRODUCT BOX */
.product-3d{
width:150px;
height:150px;
margin:auto;
transform-style:preserve-3d;
animation:rotate 5s infinite linear;
}

.face{
position:absolute;
width:150px;
height:150px;
background:#00f2ff;
opacity:0.8;
border:2px solid white;
}

.front{ transform:translateZ(75px); }
.back{ transform:rotateY(180deg) translateZ(75px);}
.left{ transform:rotateY(-90deg) translateZ(75px);}
.right{ transform:rotateY(90deg) translateZ(75px);}
.top{ transform:rotateX(90deg) translateZ(75px);}
.bottom{ transform:rotateX(-90deg) translateZ(75px);}

@keyframes rotate{
from{transform:rotateX(0) rotateY(0);}
to{transform:rotateX(360deg) rotateY(360deg);}
}

/* AI RECOMMENDATION */
.ai-box{
background:white;
margin:40px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* CHAT */
.chat-button{
position:fixed;
bottom:20px;
right:20px;
background:#0072ff;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.chat-box{
position:fixed;
bottom:80px;
right:20px;
width:300px;
background:white;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
flex-direction:column;
}

.chat-header{
background:#0072ff;
color:white;
padding:10px;
border-radius:15px 15px 0 0;
}

.chat-messages{
height:200px;
overflow-y:auto;
padding:10px;
}

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
border:none;
padding:10px;
}

.chat-input button{
background:#0072ff;
color:white;
border:none;
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<h2>YahyaStore</h2>
<input type="text" placeholder="Search product..." onkeyup="recommend(this.value)">
</nav>

<section class="hero">
<h1>Smart AI Ecommerce</h1>
<p>Produk terbaik dengan rekomendasi pintar</p>
</section>

<section class="products" id="productList">
<div class="card" data-category="gaming">
<div class="product-3d">
<div class="face front"></div>
<div class="face back"></div>
<div class="face left"></div>
<div class="face right"></div>
<div class="face top"></div>
<div class="face bottom"></div>
</div>
<h3>Gaming Headset</h3>
<p class="price">Rp 450.000</p>
</div>

<div class="card" data-category="fashion">
<h3>Streetwear Hoodie</h3>
<p class="price">Rp 300.000</p>
</div>

<div class="card" data-category="tech">
<h3>Wireless Mouse</h3>
<p class="price">Rp 250.000</p>
</div>

<div class="card" data-category="gaming">
<h3>Mechanical Keyboard</h3>
<p class="price">Rp 800.000</p>
</div>
</section>

<section class="ai-box">
<h2>🤖 AI Recommendation</h2>
<p id="aiResult">Ketik di search untuk dapat rekomendasi personal...</p>
</section>

<!-- CHAT -->
<div class="chat-button" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
<div class="chat-header">Live Chat Seller</div>
<div class="chat-messages" id="messages"></div>
<div class="chat-input">
<input type="text" id="chatInput" placeholder="Ketik pesan...">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>
function recommend(value){
let cards=document.querySelectorAll(".card");
let aiText=document.getElementById("aiResult");

cards.forEach(card=>{
if(card.innerText.toLowerCase().includes(value.toLowerCase())){
card.style.display="block";
}else{
card.style.display="none";
}
});

if(value.includes("game")){
aiText.innerHTML="🔥 Rekomendasi: Gaming Headset & Mechanical Keyboard cocok buat kamu!";
}
else if(value.includes("fashion")){
aiText.innerHTML="👕 Kamu suka fashion? Hoodie Streetwear paling laris!";
}
else if(value.includes("tech")){
aiText.innerHTML="🖱 Wireless Mouse paling banyak dibeli!";
}
else{
aiText.innerHTML="Kami sedang analisa preferensi kamu...";
}
}

function toggleChat(){
let chat=document.getElementById("chatBox");
chat.style.display=chat.style.display==="flex"?"none":"flex";
}

function sendMessage(){
let input=document.getElementById("chatInput");
let messages=document.getElementById("messages");

let userMsg=document.createElement("div");
userMsg.innerHTML="<b>Kamu:</b> "+input.value;
messages.appendChild(userMsg);

setTimeout(()=>{
let botMsg=document.createElement("div");
botMsg.innerHTML="<b>Seller:</b> Produk ready ya, bisa langsung checkout 👍";
messages.appendChild(botMsg);
messages.scrollTop=messages.scrollHeight;
},1000);

input.value="";
}
</script>

</body>
</html>
